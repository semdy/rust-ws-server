<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rust WebSocket Client Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1d232a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(960px, 100%);
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dfe4ea;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(20, 35, 55, 0.08);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 650;
        color: #4a5562;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #cfd7df;
        border-radius: 6px;
        padding: 10px 12px;
        background: #ffffff;
        color: #1d232a;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        cursor: pointer;
        background: #1f6feb;
        color: #ffffff;
        font-weight: 700;
      }

      button.secondary {
        background: #e8edf3;
        color: #1d232a;
      }

      button.danger {
        background: #d1242f;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #8c959f;
      }

      .dot.open {
        background: #1a7f37;
      }

      .dot.closed {
        background: #d1242f;
      }

      pre {
        margin: 0;
        min-height: 280px;
        max-height: 420px;
        overflow: auto;
        border-radius: 8px;
        padding: 14px;
        background: #111827;
        color: #d1d5db;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 720px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rust WebSocket Client Demo</h1>

      <section class="panel">
        <div class="grid">
          <label>
            Server
            <input id="server" value="ws://127.0.0.1:8080/ws" />
          </label>
          <label>
            Topic
            <input id="topic" value="public" />
          </label>
          <label>
            Client ID
            <input id="clientId" value="web-demo" />
          </label>
          <label>
            Tenant ID
            <input id="tenantId" value="default" />
          </label>
          <label>
            Token
            <input id="token" value="" />
          </label>
          <label>
            状态
            <span class="status">
              <span id="statusDot" class="dot"></span>
              <span id="statusText">未连接</span>
            </span>
          </label>
        </div>

        <div class="actions">
          <button id="connectBtn">连接</button>
          <button id="disconnectBtn" class="danger" disabled>断开</button>
          <button id="pingBtn" class="secondary" disabled>Ping</button>
          <button id="clearBtn" class="secondary">清空日志</button>
        </div>
      </section>

      <section class="panel">
        <label>
          要发布的 payload JSON
          <textarea id="payload">{"text":"hello from browser","ts":0}</textarea>
        </label>
        <div class="grid" style="margin-top: 12px">
          <label>
            私聊目标 Client ID
            <input id="targetClientId" value="bob" />
          </label>
          <label>
            发送模式
            <select id="mode">
              <option value="group">群聊：发送到当前 topic</option>
              <option value="direct">私聊：发送到目标 client_id</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="sendBtn" disabled>发送</button>
          <button id="sendRoomBtn" class="secondary" disabled>发布到 room-a</button>
        </div>
      </section>

      <section class="panel">
        <pre id="log"></pre>
      </section>
    </main>

    <script>
      const els = {
        server: document.querySelector("#server"),
        topic: document.querySelector("#topic"),
        clientId: document.querySelector("#clientId"),
        tenantId: document.querySelector("#tenantId"),
        token: document.querySelector("#token"),
        statusDot: document.querySelector("#statusDot"),
        statusText: document.querySelector("#statusText"),
        connectBtn: document.querySelector("#connectBtn"),
        disconnectBtn: document.querySelector("#disconnectBtn"),
        pingBtn: document.querySelector("#pingBtn"),
        clearBtn: document.querySelector("#clearBtn"),
        payload: document.querySelector("#payload"),
        targetClientId: document.querySelector("#targetClientId"),
        mode: document.querySelector("#mode"),
        sendBtn: document.querySelector("#sendBtn"),
        sendRoomBtn: document.querySelector("#sendRoomBtn"),
        log: document.querySelector("#log"),
      };

      let socket = null;
      let requestSeq = 0;

      function appendLog(direction, data) {
        const time = new Date().toLocaleTimeString();
        const value =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
        els.log.textContent += `[${time}] ${direction}\n${value}\n\n`;
        els.log.scrollTop = els.log.scrollHeight;
      }

      function setConnected(connected) {
        els.statusDot.className = `dot ${connected ? "open" : "closed"}`;
        els.statusText.textContent = connected ? "已连接" : "已断开";
        els.connectBtn.disabled = connected;
        els.disconnectBtn.disabled = !connected;
        els.pingBtn.disabled = !connected;
        els.sendBtn.disabled = !connected;
        els.sendRoomBtn.disabled = !connected;
      }

      function buildUrl() {
        const url = new URL(els.server.value);
        url.searchParams.set("topic", els.topic.value || "public");
        if (els.token.value) {
          url.searchParams.set("token", els.token.value);
        } else {
          url.searchParams.set("client_id", els.clientId.value || "web-demo");
          url.searchParams.set("tenant_id", els.tenantId.value || "default");
        }
        return url.toString();
      }

      function sendJson(message) {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          appendLog("ERR", "WebSocket 未连接");
          return;
        }
        const encoded = JSON.stringify(message);
        socket.send(encoded);
        appendLog("SEND", message);
      }

      function parsePayload() {
        const raw = els.payload.value.trim();
        if (!raw) {
          return null;
        }
        return JSON.parse(raw);
      }

      els.connectBtn.addEventListener("click", () => {
        if (socket && socket.readyState === WebSocket.OPEN) {
          return;
        }

        const url = buildUrl();
        socket = new WebSocket(url);
        socket.binaryType = "arraybuffer";
        appendLog("INFO", `connecting ${url}`);

        socket.addEventListener("open", () => {
          setConnected(true);
          appendLog("INFO", "connected");
        });

        socket.addEventListener("message", (event) => {
          try {
            if (event.data instanceof ArrayBuffer) {
              appendLog("RECV", decodeMsgpack(new Uint8Array(event.data)));
            } else {
              appendLog("RECV", JSON.parse(event.data));
            }
          } catch (err) {
            appendLog("RECV", {
              error: `无法解析服务端消息: ${err.message}`,
              raw_type: Object.prototype.toString.call(event.data),
            });
          }
        });

        socket.addEventListener("close", (event) => {
          setConnected(false);
          appendLog("INFO", `closed code=${event.code} reason=${event.reason}`);
        });

        socket.addEventListener("error", () => {
          appendLog("ERR", "websocket error");
        });
      });

      els.disconnectBtn.addEventListener("click", () => {
        if (socket) {
          socket.close(1000, "client close");
        }
      });

      els.pingBtn.addEventListener("click", () => {
        sendJson({
          kind: "ping",
          request_id: `web-${++requestSeq}`,
          payload: { from: "browser" },
        });
      });

      els.sendBtn.addEventListener("click", () => {
        try {
          const payload = parsePayload();
          if (payload && typeof payload === "object") {
            payload.ts = Date.now();
          }
          if (els.mode.value === "direct") {
            sendJson({
              kind: "direct",
              to: els.targetClientId.value.trim(),
              request_id: `web-${++requestSeq}`,
              payload,
            });
          } else {
            sendJson({
              kind: "publish",
              request_id: `web-${++requestSeq}`,
              payload,
            });
          }
        } catch (err) {
          appendLog("ERR", `payload JSON 解析失败: ${err.message}`);
        }
      });

      els.sendRoomBtn.addEventListener("click", () => {
        try {
          sendJson({
            kind: "publish",
            topic: "room-a",
            request_id: `web-${++requestSeq}`,
            payload: parsePayload(),
          });
        } catch (err) {
          appendLog("ERR", `payload JSON 解析失败: ${err.message}`);
        }
      });

      els.clearBtn.addEventListener("click", () => {
        els.log.textContent = "";
      });

      function decodeMsgpack(bytes) {
        let offset = 0;
        const decoder = new TextDecoder();

        function ensure(length) {
          if (offset + length > bytes.length) {
            throw new Error("MessagePack 数据不完整");
          }
        }

        function read(length) {
          ensure(length);
          const slice = bytes.slice(offset, offset + length);
          offset += length;
          return slice;
        }

        function readU8() {
          ensure(1);
          return bytes[offset++];
        }

        function readU16() {
          const view = read(2);
          return (view[0] << 8) | view[1];
        }

        function readU32() {
          const view = read(4);
          return (
            view[0] * 2 ** 24 +
            (view[1] << 16) +
            (view[2] << 8) +
            view[3]
          );
        }

        function readU64() {
          const hi = readU32();
          const lo = readU32();
          return hi * 2 ** 32 + lo;
        }

        function readI8() {
          const value = readU8();
          return value > 0x7f ? value - 0x100 : value;
        }

        function readI16() {
          const value = readU16();
          return value > 0x7fff ? value - 0x10000 : value;
        }

        function readI32() {
          return readU32() | 0;
        }

        function readString(length) {
          return decoder.decode(read(length));
        }

        function decodeValue() {
          const marker = readU8();

          if (marker <= 0x7f) return marker;
          if (marker >= 0xe0) return marker - 0x100;
          if (marker >= 0xa0 && marker <= 0xbf) return readString(marker & 0x1f);
          if (marker >= 0x90 && marker <= 0x9f) return decodeArray(marker & 0x0f);
          if (marker >= 0x80 && marker <= 0x8f) return decodeMap(marker & 0x0f);

          switch (marker) {
            case 0xc0:
              return null;
            case 0xc2:
              return false;
            case 0xc3:
              return true;
            case 0xcc:
              return readU8();
            case 0xcd:
              return readU16();
            case 0xce:
              return readU32();
            case 0xcf:
              return readU64();
            case 0xd0:
              return readI8();
            case 0xd1:
              return readI16();
            case 0xd2:
              return readI32();
            case 0xd9:
              return readString(readU8());
            case 0xda:
              return readString(readU16());
            case 0xdb:
              return readString(readU32());
            case 0xdc:
              return decodeArray(readU16());
            case 0xdd:
              return decodeArray(readU32());
            case 0xde:
              return decodeMap(readU16());
            case 0xdf:
              return decodeMap(readU32());
            default:
              throw new Error(`暂不支持的 MessagePack marker: 0x${marker.toString(16)}`);
          }
        }

        function decodeArray(length) {
          const value = [];
          for (let index = 0; index < length; index += 1) {
            value.push(decodeValue());
          }
          return value;
        }

        function decodeMap(length) {
          const value = {};
          for (let index = 0; index < length; index += 1) {
            value[decodeValue()] = decodeValue();
          }
          return value;
        }

        const value = decodeValue();
        if (offset !== bytes.length) {
          throw new Error("MessagePack 数据尾部存在未消费字节");
        }
        return value;
      }

      setConnected(false);
      appendLog("INFO", "先启动服务端：cargo run --release");
    </script>
  </body>
</html>
